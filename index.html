<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahuna Venao</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Georgia',serif;background:#FEFBF6;color:#2C1F1A;
       display:flex;align-items:center;justify-content:center;
       min-height:100vh;text-align:center;padding:2rem;padding-top:45vh}
  .logo{width:90px;height:auto;margin-bottom:1.2rem}
  h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:400;letter-spacing:.02em;margin-bottom:1rem}
  p{font-family:system-ui,sans-serif;font-size:.95rem;letter-spacing:.08em;
    text-transform:uppercase;color:rgba(44,31,26,.5);margin-bottom:2.5rem}
  a{display:inline-block;padding:.8rem 2rem;border:1px solid #C4714A;
    color:#C4714A;font-family:system-ui,sans-serif;font-size:.75rem;
    letter-spacing:.14em;text-transform:uppercase;text-decoration:none;
    transition:background .3s,color .3s}
  a:hover{background:#C4714A;color:#fff}
</style>
</head>
<body>
  <div>
    <img class="logo" src="/retreat/kahuna-logo.png" alt="Kahuna Venao">
    <h1>Kahuna Venao</h1>
    <p>Coming Soon</p>
    <a href="/retreat">View Retreat →</a>
  </div>
</body>
</html>

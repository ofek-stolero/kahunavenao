<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahuna Venao</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#FEFBF6;color:#2C1F1A;min-height:100vh;overflow:hidden}

  .logo{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:clamp(180px,28vw,280px);height:auto;display:block;
  }

  .content{
    position:absolute;left:50%;
    top:calc(50% + clamp(105px,16.4vw,164px));
    transform:translateX(-50%);
    text-align:center;white-space:nowrap;
    font-family:'Georgia',serif;
  }
  h1{font-size:clamp(1.6rem,4vw,3rem);font-weight:400;letter-spacing:.02em;margin-bottom:.8rem}
  p{font-family:system-ui,sans-serif;font-size:.85rem;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(44,31,26,.45);margin-bottom:2rem}
  a{display:inline-block;padding:.7rem 1.8rem;border:1px solid #C4714A;
    color:#C4714A;font-family:system-ui,sans-serif;font-size:.72rem;
    letter-spacing:.14em;text-transform:uppercase;text-decoration:none;
    transition:background .3s,color .3s}
  a:hover{background:#C4714A;color:#fff}
</style>
</head>
<body>
  <img class="logo" src="/retreat/kahuna-logo.png" alt="Kahuna Venao">
  <div class="content">
    <h1>Kahuna Venao</h1>
    <p>Coming Soon</p>
    <a href="/retreat">View Retreat →</a>
  </div>
</body>
</html>
